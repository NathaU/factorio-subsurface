[item-description]
fluid-elevator=Подключите их как подземные трубы.\nПосле размещения используйте __CONTROL__rotate__, чтобы сменить направление потока.
item-elevator=Подключите их как подземные конвейеры.\nПосле размещения используйте __CONTROL__rotate__, чтобы сменить направление транспортировки.
cave-sealing=Забросайте камнями ненужное пространство в пещерах или входы в туннели!
placement-restriction=[font=default-bold][color=yellow]Нельзя разместить под землей.[/color][/font]

[entity-description]
tunnel-entrance-cable=Спустись в темные глубины вашей планеты! Нажмите __CONTROL__toggle-driving__, но остерегайтесь загрязнения и отсутствия дневного света.
tunnel-exit-cable=Поднимитесь к дневному свету! Нажмите __CONTROL__toggle-driving__, чтобы вновь вдохнуть свежий воздух и увидеть дневной свет.
surface-drill=Убедитесь, что выкопанный грунт убран, и подождите, что будет дальше.\n[font=default-bold][color=yellow]Помните, что после того, как вход будет выкопан, его уже нельзя будет убрать.[/color][/font]
fluid-elevator=Используйте __CONTROL__rotate__ (вращение) для переключения направления потока.\nВы также можете использовать __CONTROL__reverse-rotate__ (обратное вращение) для вращения против часовой стрелки.
item-elevator=Используйте __CONTROL__rotate__ (вращение) для переключения направления транспортировки.\nВы также можете использовать __CONTROL__reverse-rotate__ (обратное вращение) для вращения против часовой стрелки.
active-air-vent=Активная вентиляция перемещает загрязнение снизу вверх, потребляя для своей работы электричество.\n\nПропускная способность определяется базовой скоростью производства предметов и двойным бонусом к скорости от модуля с уменьшением на 80% за каждый уровень подповерхности.
air-vent=Пассивная вентиляция выравнивает загрязнение между поверхностностями. Если верхняя поверхность загрязнена сильнее, загрязнение будет уходить под землю, поэтому убедитесь, что для его рассеивания достаточно места. Для работы простой вентиляции не требуется электричество.
prospector=Сканирует в пределах своего радиуса местность для поиска самого богатого ресурсами месторождения.
support=Опора предотвращает обвалы и распределяет электроэнергию.
subway=Железнодорожный тоннель для пересечения поездами межповерхностей.

