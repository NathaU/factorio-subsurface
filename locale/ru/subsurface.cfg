[mod-setting-description]
pollution-trains=Включите эту опцию для более сложного управления подземными поездами
pollution-trains-excludes=Введите названия локомотивов, которые не должны вызывать загрязнение (электрические локомотивы). Список разделенный запятыми.
subsurface-limit=Количество максимально доступных подземных поверхностей.\nИзменение этого параметра при наличии более глубоких поверхностей НЕ удаляет их.
generate-resources-underground=Если включено, ресурсы будут также генерироваться в подповерхностях, но при этом уменьшится добыча ресурсов на поверхности. Начальные месторождения остаются нетронутым и не будут генерироваться в подземных поверхностях.\nЕсли вы играете в пользовательские миры, такие как Железнодорожный мир, вы можете отключить эту настройку.\n[color=yellow]Изменение этого параметра не влияет на существующие ресурсы![/color]
enable-challenges=Если включено, поверхности  под землей станут более сложными из-за загрязнения и появления врагов, но взамен предлагают больше возможностей.\nЕсли вы хотите использовать этот мод только для того, чтобы разгрузить пространсво на своем заводе без каких-либо дополнительных сложностей и функций, вы можете отключить эту настройку.
show-prospector-range=Отображает дальность разведки рудоискателя на карте.

[surface-property-name]
subsurface-level=Подземная поверхность

[tips-and-tricks-item-name]
clear-subsurface-deconstruction=Расчистка строительными дронами
inter-surface-transport=Межповерхностная транспортировка
subways=Подземные туннели

[tips-and-tricks-item-description]
subsurface=Спустись в темные глубины вашей планеты! Нажмите __CONTROL__toggle-driving__ для смены поверхности.\n[entity=tunnel-entrance-cable] и выход может быть подключен к электрической и логической сети для передачи энергии и сигналов между поверхностями. Для распределения электроэнергии используйте [entity=wooden-support] или [entity=steel-support]. Опоры также обеспечивают источник освещения.
clear-subsurface-deconstruction=Отметьте участки в подземных поверхностях, которые необходимо расчистить строительными дронами, используя план сноса (__CONTROL__select-for-cancel-deconstruct__). Дроны автоматически проведут демонтаж всех стен, соприкасающихся с выделенным участком. Если выделенный участок полностью находится в пустоте, ничего не произойдет.\nПримечание: в таком случае необходимо использовать действие «отменить снос».
inter-surface-transport=Транспортируйте предметы, жидкости или тепло между поверхностями. Маркеры показывают правильное положение для размещения противоположной части. Переключить вход и выход с помощью __CONTROL__rotate__ после размещения и __CONTROL__reverse-rotate__ для поворота против часовой стрелки (только для грузового и трубопроводного лифта).
subways=Подземные туннели позволяют поездам перемещаться между поверхностями.\nРазместите [entity=subway] на обоих поверхностях, используя маркеры (аналогично [tip=inter-surface-transport]).\nДобавьте подземные туннели в расписание движения поездов. В списке доступны все станции поездов со всех поверхностей, что позволяет создавать междуповерхностные расписания. Однако с пересечениями тунелей могут возникнуть сложности, убедитесь, что они активируются на правильних поверхностях.\nПоезда, въезжающие в подземные туннели, ​​сохраняют свою скорость. Их нельзя контролировать, и они не будут двигаться, пока полностью не появятся, поэтому убедитесь, подземная железнодорожная сеть способна справиться с самым длинным поездом, без застревания. Один поезд может находиться одновременно в двух туннелях.


