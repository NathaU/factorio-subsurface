name: Publish Factorio Mod

on:
    push:
        branches:
            - master
        paths:
            - 'info.json'

jobs:
    publish-mod:
        runs-on: ubuntu-latest
        steps:
            - name: Update translations from Crowdin
              run: curl -G -d 'repo=NathaU/factorio-subsurface' -d 'secret=${{ secrets.FACTORIO_MODS_LOCALIZATION }}' https://factorio-mods-localization.fly.dev/api/triggerUpdateWithSecret

            - uses: GuillaumeFalourd/wait-sleep-action@v1
              with:
                time: '30'
            
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Validate Mod
              uses: TheBrutalX/factorio-mod-uploader-action@v1
              with:
                  action: validate

            - name: Create zip
              uses: TheBrutalX/factorio-mod-uploader-action@v1
              with:
                  action: compress

            - name: Upload Mod
              uses: TheBrutalX/factorio-mod-uploader-action@v1
              with:
                  action: upload
                  factorio-api-key: ${{ secrets.FACTORIO_API_KEY }}
